name: Test and Build Project

on:
  workflow_dispatch:
  push:
  pull_request:

env:
  UNITY_VERSION: 6000.3.7f1
  CACHE_VERSION: v2

jobs:

  testProject:
    name: Test in ${{ matrix.testMode }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        testMode:
          - editmode
          - playmode

    steps:

      # -------------------------------
      # Free Disk Space
      # -------------------------------
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo docker system prune -af || true
          df -h

      # -------------------------------
      # Checkout
      # -------------------------------
      - uses: actions/checkout@v4
        with:
          lfs: true

      # -------------------------------
      # Cache Library
      # -------------------------------
      - uses: actions/cache@v4
        with:
          path: Library
          key: >
            Library-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-
            Test-
            ${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json') }}

      # -------------------------------
      # Run Tests
      # -------------------------------
      - uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: ${{ matrix.testMode }}
          artifactsPath: test-artifacts-${{ matrix.testMode }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TestResults-${{ matrix.testMode }}
          path: test-artifacts-${{ matrix.testMode }}

  buildForAllDesiredPlatforms:
    needs: testProject
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
          - WebGL

    steps:

      # -------------------------------
      # Free Disk Space Again
      # -------------------------------
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo docker system prune -af || true
          df -h

      # -------------------------------
      # Checkout
      # -------------------------------
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # -------------------------------
      # Cache Library Per Platform
      # -------------------------------
      - uses: actions/cache@v4
        with:
          path: Library
          key: >
            Library-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-
            ${{ matrix.targetPlatform }}-
            ${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json') }}

      # -------------------------------
      # Build
      # -------------------------------
      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: ${{ matrix.targetPlatform }}

      # -------------------------------
      # Upload Build Artifacts
      # -------------------------------
      - uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}
